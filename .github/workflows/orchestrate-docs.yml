# Orchestrator: Runs documentation + marketing agents across all org repos
#
# This workflow discovers all repos in the richi-solutions org that have
# a .claude/agents/documentation.md file, then runs two Claude agents
# sequentially on each repo:
#   1. documentation — README, JSDoc, architecture docs, CONTRIBUTING
#   2. marketing     — MARKETING.md (value prop, audience, positioning)
# Changes from both agents land in one combined PR per repo.
#
# Requires org secrets:
#   - ANTHROPIC_API_KEY
#   - ORG_PAT (GitHub PAT with repo scope for creating PRs across repos)

name: Orchestrate Documentation Update

on:
  workflow_dispatch:
  # Schedule disabled — run manually via workflow_dispatch to save ~50 EUR/month
  # Previously: cron: "0 5 * * 1" (Weekly Monday 05:00 UTC)

jobs:
  discover:
    name: Discover Repos
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.list.outputs.repos }}
    steps:
      - name: List org repos with documentation agent
        id: list
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT }}
        run: |
          # Get all non-archived repos in the org
          REPOS=$(gh repo list richi-solutions \
            --no-archived \
            --json name,name \
            --limit 100 \
            -q '.[].name' \
            | grep -v '^orchestrator\.richi\.solutions$' \
            | grep -v '^\\.claude$')

          # Filter to repos that have the documentation agent
          VALID_REPOS="[]"
          for repo in $REPOS; do
            if gh api "repos/richi-solutions/$repo/contents/.claude/agents/documentation.md" --silent 2>/dev/null; then
              VALID_REPOS=$(echo "$VALID_REPOS" | jq --arg r "$repo" '. + [$r]')
            fi
          done

          echo "repos=$(echo $VALID_REPOS | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "Found repos with documentation agent: $VALID_REPOS"

  update-docs:
    name: Update Docs — ${{ matrix.repo }}
    needs: discover
    if: needs.discover.outputs.repos != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: ${{ fromJson(needs.discover.outputs.repos) }}
      fail-fast: false
      max-parallel: 3
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          repository: richi-solutions/${{ matrix.repo }}
          token: ${{ secrets.ORG_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Documentation Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "You are the documentation agent. Read .claude/agents/documentation.md for your full instructions, then analyze this project and generate/update all documentation: README.md, code comments (JSDoc/@fileoverview), architecture docs, CONTRIBUTING.md, and .env.example. CRITICAL RULES: Do NOT modify application logic. Do NOT modify any files under .claude/ — that directory is managed by sync-dotclaude and must not be touched. Do NOT modify MARKETING.md — the marketing agent owns that file." \
            --allowedTools "Bash,Read,Edit,Write,Grep,Glob" \
            --model claude-sonnet-4-6 \
            --max-turns 30 \
            --output-format json \
            > /tmp/docs-result.json 2>&1 || true

      - name: Run Claude Marketing Agent
        if: hashFiles('.claude/agents/marketing.md') != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "You are the marketing agent. Read .claude/agents/marketing.md for your full instructions, then analyze this project and generate/update MARKETING.md only. CRITICAL RULES: Only modify MARKETING.md. Do NOT modify README.md, CONTRIBUTING.md, source code, tests, or any files under .claude/. Do NOT invent features that are not in the codebase." \
            --allowedTools "Bash,Read,Edit,Write,Grep,Glob" \
            --model claude-sonnet-4-6 \
            --max-turns 20 \
            --output-format json \
            > /tmp/marketing-result.json 2>&1 || true

      - name: Commit docs changes directly to default branch
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            # Revert any changes to .claude/ (managed by sync-dotclaude)
            git checkout -- .claude/ 2>/dev/null || true

            if [ -z "$(git status --porcelain -- ':!.claude/')" ]; then
              echo "Only .claude/ changes detected for ${{ matrix.repo }}, skipping"
              exit 0
            fi

            # Extract summaries from both agent outputs (for commit body)
            DOCS_SUMMARY=$(cat /tmp/docs-result.json | jq -r '.result // "No summary available"' 2>/dev/null || echo "Documentation update completed.")
            MARKETING_SUMMARY=$(cat /tmp/marketing-result.json 2>/dev/null | jq -r '.result // "Marketing agent did not run"' 2>/dev/null || echo "Marketing agent did not run")

            git config user.name "richi-solutions"
            git config user.email "info@richi.solutions"
            git add -A -- ':!.claude/'

            DEFAULT_BRANCH=$(gh repo view "richi-solutions/${{ matrix.repo }}" --json defaultBranchRef -q '.defaultBranchRef.name')

            git commit -m "docs: automated documentation + marketing update" \
              -m "Generated by Claude documentation and marketing agents." \
              -m "### Documentation" \
              -m "$DOCS_SUMMARY" \
              -m "### Marketing" \
              -m "$MARKETING_SUMMARY" \
              -m "Automated by orchestrate-docs.yml" \
              -m "Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"

            git push origin "HEAD:${DEFAULT_BRANCH}"
          else
            echo "No documentation or marketing changes needed for ${{ matrix.repo }}"
          fi

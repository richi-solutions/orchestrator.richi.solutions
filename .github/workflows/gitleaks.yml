# Reusable workflow: Secret scanning with gitleaks
# Called by project repos via security.yml

name: Gitleaks Secret Scan

on:
  workflow_call:

jobs:
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

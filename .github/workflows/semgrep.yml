# Reusable workflow: SAST with Semgrep
# Called by project repos via security.yml

name: Semgrep SAST

on:
  workflow_call:

jobs:
  semgrep:
    name: SAST Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep ci \
            --config=p/typescript \
            --config=p/javascript \
            --config=p/secrets \
            --config=p/owasp-top-ten \
            --sarif --output=semgrep-results.sarif \
            || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
        continue-on-error: true
